<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f5f5f5;
    font-family: Arial;
}

fieldset{
    border:2px solid #007bff;
    padding:20px;
}

legend{
    color:#007bff;
    font-weight:bold;
}

input, textarea, select{
    margin:5px;
    padding:8px;
}
</style>

<script>
function validateForm(){

let name=document.getElementById("fullname").value;
let email=document.getElementById("email").value;
let telephone=document.getElementById("telephone").value;

let interests=document.querySelectorAll('input[name="interest"]:checked');

if(name=="" || email=="" || telephone==""){
alert("Please fill all required fields");
return false;
}

if(interests.length==0){
alert("Select at least one area of interest");
return false;
}

return true;
}
</script>

</head>

<body>

<div class="container mt-5">

<form onsubmit="return validateForm()">

<fieldset>

<legend>Job Application Form</legend>

<h5>Personal Information</h5>

<label class="form-label">Full Name</label>
<input type="text" id="fullname" class="form-control">

<label class="form-label">Email</label>
<input type="email" id="email" class="form-control">

<label class="form-label">Telephone</label>
<input type="text" id="telephone" class="form-control">

<label class="form-label">Address</label>
<input type="text" class="form-control">

<br>

<h5>Position Information</h5>

<label class="form-label">Desired Job Title</label>

<select class="form-control">
<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>
</select>

<br>

<label class="form-label">Employment Type</label><br>

<input type="radio" name="type"> Part-time Contract<br>
<input type="radio" name="type"> Part-time Permanent<br>
<input type="radio" name="type"> Full-time Contract<br>
<input type="radio" name="type"> Full-time Permanent<br>

<br>

<h5>Area of Interest</h5>

<input type="checkbox" name="interest"> Account Executive<br>
<input type="checkbox" name="interest"> Business Development<br>
<input type="checkbox" name="interest"> Inside Sales<br>
<input type="checkbox" name="interest"> Sales Manager<br>
<input type="checkbox" name="interest"> VP Sales<br>

<br>

<h5>Relocation</h5>

<input type="radio" name="relocate"> Yes
<input type="radio" name="relocate"> No

<br><br>

<label class="form-label">Additional Message</label>
<textarea class="form-control" rows="4"></textarea>

<br>

<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</fieldset>

</form>

</div>

</body>
</html>
