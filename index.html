<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f5f5f5;
}

.form-container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

<script>
function validateForm(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let interest=document.getElementsByName("interest");
let checked=false;

for(let i=0;i<interest.length;i++){
if(interest[i].checked){
checked=true;
}
}

if(name=="" || email=="" || phone==""){
alert("Please fill in all required fields");
return false;
}

if(!checked){
alert("Please select at least one area of interest");
return false;
}

return true;
}
</script>

</head>

<body>

<div class="container">
<div class="form-container">

<h3 class="text-center mb-4">Job Application Form</h3>

<form onsubmit="return validateForm()">

<h5 class="mb-3">Personal Information</h5>

<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control">
</div>
</div>

<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Telephone</label>
<input type="text" id="phone" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Address</label>
<input type="text" class="form-control">
</div>
</div>


<h5 class="mt-4">Position Information</h5>

<div class="mb-3">
<label class="form-label">Desired Job Title</label>
<select class="form-select">
<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>
</select>
</div>


<label class="form-label">Employment Type</label>

<div class="row mb-3">

<div class="col-md-6 form-check">
<input class="form-check-input" type="radio" name="type">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="radio" name="type">
<label class="form-check-label">Part-time Permanent</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="radio" name="type">
<label class="form-check-label">Full-time Contract</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="radio" name="type">
<label class="form-check-label">Full-time Permanent</label>
</div>

</div>


<h5>Area of Interest</h5>

<div class="row mb-3">

<div class="col-md-6 form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Account Executive</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Business Development</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="col-md-6 form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">VP Sales</label>
</div>

</div>


<h5>Relocation</h5>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">No</label>
</div>


<div class="mb-3">
<label class="form-label">Additional Message</label>
<textarea class="form-control" rows="4"></textarea>
</div>


<div class="text-center">
<button class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>
</div>

</form>

</div>
</div>

</body>
</html>
